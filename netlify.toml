[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# www → apex (yksi hyppy)
[[redirects]]
  from = "https://www.seise.org/*"
  to = "https://seise.org/:splat"
  status = 301
  force = true

# Turvaotsakkeet (X-Content-Type-Options + HSTS tulevat jo Netlifyltä)
[[headers]]
  for = "/*"
  [headers.values]
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
